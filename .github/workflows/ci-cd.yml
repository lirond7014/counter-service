name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: counterdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Run backend tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: counterdb
          DB_USER: postgres
          DB_PASSWORD: postgres
          JAEGER_ENABLED: false
        run: |
          cd backend
          pytest test_app.py -v --tb=short

  frontend-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Debug AWS credentials
        run: |
          aws sts get-caller-identity
          aws eks describe-cluster --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}


      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: backend-${{ github.sha }}
        run: |
          cd backend
          docker build --pull --no-cache -f Dockerfile \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:backend-latest .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:backend-latest

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: frontend-${{ github.sha }}
        run: |
          cd frontend
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:frontend-latest .
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:frontend-latest

  deploy-to-eks:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: false
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Create database secret
        run: |
          kubectl create secret generic counter-db-secret \
            --from-literal=password="${{ secrets.DB_PASSWORD }}" \
            --from-literal=username="${{ secrets.DB_USER }}" \
            --dry-run=client -o yaml | kubectl apply -f - -n counter-service

      - name: Deploy with Kustomize
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
        run: |
          kubectl apply -k k8s/overlays/standard/
          kubectl set image deployment/counter-backend backend=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:backend-${{ github.sha }} -n counter-service
          kubectl set image deployment/counter-frontend frontend=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:frontend-${{ github.sha }} -n counter-service
          kubectl rollout status deployment/counter-backend -n counter-service --timeout=5m
          kubectl rollout status deployment/counter-frontend -n counter-service --timeout=5m

      - name: Smoke test (external)
        run: |
          set -euo pipefail

          NS="counter-service"
          ING="counter-frontend"

          echo "Waiting for Ingress address..."
          for i in {1..60}; do
            LB=$(kubectl -n "$NS" get ingress "$ING" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "${LB:-}" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "${LB:-}" ]; then
            echo "ERROR: Ingress hostname was not assigned in time"
            kubectl -n "$NS" describe ingress "$ING" || true
            exit 1
          fi

          echo "Ingress hostname: $LB"
          echo "DNS lookup:"
          nslookup "$LB" || true

          echo "HTTP check (may take a bit right after provisioning)..."
          for i in {1..30}; do
            if curl -fsS --max-time 10 "http://$LB/" >/dev/null; then
              echo "Smoke test OK"
              exit 0
            fi
            echo "Not reachable yet, retrying..."
            sleep 10
          done

          echo "ERROR: Frontend not reachable via Ingress after retries"
          kubectl -n "$NS" get pods -o wide || true
          kubectl -n "$NS" describe ingress "$ING" || true
          exit 1

      - name: Get service URLs
        run: |
          echo "=== Counter Service Status ==="
          kubectl get pods -n counter-service
          echo ""
          echo "=== Frontend LoadBalancer URL ==="
          kubectl get svc counter-frontend -n counter-service