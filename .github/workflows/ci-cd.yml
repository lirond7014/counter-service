      name: CI/CD Pipeline
      
      on:
        push:
          branches: [ main ]
        pull_request:
          branches: [ main ]
      
      jobs:
        deploy:
          runs-on: ubuntu-latest
          steps:
            - name: Deploy to EKS
              run: |
                kubectl apply -f k8s/namespace.yaml
                kubectl apply -f k8s/configmap.yaml
                kubectl apply -f k8s/secret.yaml
                kubectl apply -f k8s/postgres-deployment.yaml
                kubectl apply -f k8s/backend-deployment.yaml
                kubectl apply -f k8s/frontend-deployment.yaml
                kubectl rollout status deployment/counter-backend -n counter-service --timeout=5m
                kubectl rollout status deployment/counter-frontend -n counter-service --timeout=5m
      
            - name: Get service URLs
              run: |
                echo "=== Counter Service Status ==="
                kubectl get pods -n counter-service
                echo ""
                echo "=== Frontend LoadBalancer URL ==="
                kubectl get svc counter-frontend -n counter-service