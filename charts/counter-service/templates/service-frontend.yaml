apiVersion: v1
kind: Service
metadata:
  name: counter-frontend
  labels:
    {{- include "counter-service.labels" . | nindent 4 }}
    component: frontend
spec:
  type: ClusterIP
  selector:
    {{- include "counter-service.selectorLabels" . | nindent 4 }}
    component: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80