apiVersion: v1
kind: Service
metadata:
  name: counter-backend
  labels:
    {{- include "counter-service.labels" . | nindent 4 }}
    component: backend
spec:
  type: ClusterIP
  selector:
    {{- include "counter-service.selectorLabels" . | nindent 4 }}
    component: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000