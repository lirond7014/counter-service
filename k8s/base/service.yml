apiVersion: v1
kind: Service
metadata:
  name: counter-backend
  namespace: counter-service
  labels:
    component: backend
spec:
  type: ClusterIP
  selector:
    component: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: counter-frontend
spec:
  type: ClusterIP
  selector:
    component: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
