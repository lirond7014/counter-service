apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: counter-postgres-pvc
  namespace: counter-service
  labels:
    app: counter-service
    component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: counter-postgres
  namespace: counter-service
  labels:
    app: counter-service
    component: database
    version: "16"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: counter-service
      component: database
  template:
    metadata:
      labels:
        app: counter-service
        component: database
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - name: postgres
          containerPort: 5432
          protocol: TCP
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: counter-service-config
              key: DB_NAME
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: counter-service-secrets
              key: DB_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: counter-service-secrets
              key: DB_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: counter-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: counter-postgres
  namespace: counter-service
  labels:
    app: counter-service
    component: database
spec:
  type: ClusterIP
  selector:
    app: counter-service
    component: database
  ports:
  - name: postgres
    port: 5432
    targetPort: postgres
    protocol: TCP