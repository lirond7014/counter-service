apiVersion: v1
kind: ServiceAccount
metadata:
  name: counter-service
  namespace: counter-service

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: counter-service
  namespace: counter-service
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: counter-service
  namespace: counter-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: counter-service
subjects:
- kind: ServiceAccount
  name: counter-service
  namespace: counter-service